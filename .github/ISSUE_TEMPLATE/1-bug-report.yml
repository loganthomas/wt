name: Bug Report
description: Report something that is broken or not working correctly
title: "[BUG]: "
labels: ["bug"]
assignees:
  - loganthomas
body:
  - type: markdown
    attributes:
      value: |
        ## Thanks for reporting a bug!

        Before filing, please search
        [existing issues](https://github.com/loganthomas/wt/issues?q=is%3Aissue)
        for the same problem.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What went wrong, and what were you trying to do when it happened?
      placeholder: >
        Running `wt ls` inside a linked worktree prints nothing,
        but the same command in the main checkout lists all trees...
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: >
        Exact commands, starting from a fresh directory where possible —
        the closer this is to copy-paste-runnable, the faster the fix.
      placeholder: |
        1. git init demo && cd demo && git commit --allow-empty -m init
        2. git worktree add ../demo.trees/feature -b feature
        3. cd ../demo.trees/feature
        4. wt ls
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What should have happened instead?
      placeholder: "`wt ls` should list both the main checkout and the feature tree."
    validations:
      required: true

  - type: textarea
    id: actual-output
    attributes:
      label: Actual Output
      description: >
        Re-run the failing command and paste everything it printed,
        including any error text. This is formatted as code automatically.
      render: shell
    validations:
      required: false

# TODO(phase-6): once `wt doctor` ships, replace this command with
# `wt doctor --json` — it captures all of the below and more.
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Run this and paste the output
        (it contains no personal information):

        ```sh
        wt --version; git --version; sw_vers -productVersion; uname -m; zsh --version; which -a wt git
        ```
      render: shell
      placeholder: |
        wt version 0.1.0 (commit abc1234, built 2026-07-18)
        git version 2.50.1
        14.6.1
        arm64
        zsh 5.9 (x86_64-apple-darwin23.0)
        /opt/homebrew/bin/wt
        /opt/homebrew/bin/git
        /usr/bin/git
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: How did you install wt?
      options:
        - Homebrew (brew install loganthomas/tap/wt)
        - go install
        - Built from source
      default: 0
    validations:
      required: true

  - type: checkboxes
    id: confirmations
    attributes:
      label: Final checks
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
        - label: I can reproduce this on the latest released version
          required: false

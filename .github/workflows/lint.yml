name: lint

# pull_request covers every PR (phase branches → dev, dev → main);
# push runs only on main so a dev→main PR doesn't double-run the job.
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - uses: golangci/golangci-lint-action@v8
        with:
          # Pinned so the required check can't shift under a merge;
          # bump deliberately alongside .golangci.yml.
          version: v2.12.2

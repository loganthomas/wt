name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # A tag can point at a commit main never tested;
  # re-run the gate so a broken binary cannot ship.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race ./...

  goreleaser:
    needs: test
    # Pure-Go cross-compile (CGO_ENABLED=0): ubuntu builds the darwin
    # binaries byte-identically, without macOS runner queues.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Fine-grained PAT with contents:write on loganthomas/homebrew-tap;
          # the default GITHUB_TOKEN cannot push to another repository.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

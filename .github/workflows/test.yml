name: test

# pull_request covers every PR (phase branches into dev, dev into main);
# push runs only on main so a dev-to-main PR doesn't double-run the matrix.
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  # Superseded PR pushes are safe to cancel; main runs are not,
  # since every main commit needs a completed verdict.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        # ubuntu keeps portability honest for free; macOS is the v1 target
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      # macOS ships zsh; ubuntu needs it installed so the
      # shell-integration smoke tests run on both platforms
      # instead of silently skipping on one.
      - if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq zsh
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race ./...
